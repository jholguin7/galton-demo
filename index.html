<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Galton — Team Statistics</title>
<meta name="viewport" content="width=1440" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-outer: oklch(52% 0.008 170);
    --bg-field: oklch(48% 0.008 170);
    --surface: oklch(78% 0.012 170 / 0.45);
    --surface-2: oklch(82% 0.01 170 / 0.35);
    --surface-3: oklch(86% 0.008 170 / 0.3);
    --ink: oklch(22% 0.01 170);
    --ink-2: oklch(32% 0.01 170);
    --ink-soft: oklch(42% 0.01 170 / 0.95);
    --line: oklch(55% 0.008 170 / 0.22);
    --line-2: oklch(55% 0.008 170 / 0.4);
    --accent: oklch(94% 0.19 115);
    --accent-ink: oklch(30% 0.10 115);
    --accent-glow: oklch(94% 0.19 115 / 0.35);
    --tick: oklch(94% 0.004 170 / 0.85);
    --tick-dim: oklch(94% 0.004 170 / 0.4);
  }
  html,body{margin:0;padding:0;background:var(--bg-outer);font-family:'Inter',system-ui,sans-serif;color:var(--ink);}
  body{min-height:100vh;}
  *{box-sizing:border-box}
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;padding:0}
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace}
  .serif{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400}

  /* Liquid glass — Petr Knoll technique: layered inner shadows for
     highlight + bevel, conic-gradient outline for refractive edge,
     offset blurred shadow behind for depth.
     Apply .liquid-glass to a container; effect activates via :root[data-lg="on"].
     Intensity scales with --lg-intensity (0..1). */
  :root[data-lg="on"] .liquid-glass{
    --lg-border: clamp(1px, 1.2px, 2px);
    position:relative;
    background:
      linear-gradient(
        0deg,
        oklch(100% 0 0 / var(--lg-tint, 0.15)),
        oklch(100% 0 0 / var(--lg-tint, 0.15))
      ),
      var(--surface-2) !important;
    backdrop-filter: blur(var(--lg-blur, 14px)) saturate(calc(140% + 40% * var(--lg-intensity, 1))) !important;
    -webkit-backdrop-filter: blur(var(--lg-blur, 14px)) saturate(calc(140% + 40% * var(--lg-intensity, 1))) !important;
    border: 0 !important;
    box-shadow:
      inset 0 2px 2px oklch(0% 0 0 / calc(0.06 * var(--lg-intensity, 1))),
      inset 0 -2px 2px oklch(100% 0 0 / calc(0.55 * var(--lg-intensity, 1))),
      inset 0 0 1.6px 4px oklch(100% 0 0 / calc(0.22 * var(--lg-intensity, 1))),
      0 4px 2px -2px oklch(0% 0 0 / calc(0.22 * var(--lg-intensity, 1))),
      0 22px 34px -14px oklch(0% 0 0 / calc(0.35 * var(--lg-intensity, 1))),
      0 42px 70px -24px oklch(0% 0 0 / calc(0.22 * var(--lg-intensity, 1)));
  }
  /* Conic-gradient refractive outline — this is the key "real glass" cue.
     Two opposing bright arcs on an otherwise dark edge fake the refracted
     specular of a curved glass rim. */
  :root[data-lg="on"] .liquid-glass::before{
    content:'';
    position:absolute;
    inset: calc(-1 * var(--lg-border));
    border-radius: inherit;
    padding: var(--lg-border);
    background:
      conic-gradient(
        from -75deg at 50% 50%,
        oklch(0% 0 0 / calc(0.55 * var(--lg-intensity, 1))),
        oklch(0% 0 0 / 0) 5% 40%,
        oklch(100% 0 0 / calc(0.9 * var(--lg-intensity, 1))) 50%,
        oklch(0% 0 0 / 0) 60% 95%,
        oklch(0% 0 0 / calc(0.55 * var(--lg-intensity, 1)))
      ),
      linear-gradient(180deg,
        oklch(100% 0 0 / calc(0.5 * var(--lg-intensity, 1))),
        oklch(100% 0 0 / calc(0.5 * var(--lg-intensity, 1))));
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events:none;
  }
  /* Moving specular highlight — the smeared reflection that slides across
     real glass. Screen-blended so it reads as light, not paint. */
  :root[data-lg="on"] .liquid-glass::after{
    content:'';
    position:absolute;
    inset: var(--lg-border);
    border-radius: inherit;
    background: linear-gradient(
      var(--lg-sheen-angle, -45deg),
      oklch(100% 0 0 / 0) 0%,
      oklch(100% 0 0 / calc(var(--lg-sheen, 0.45) * 1)) 40%,
      oklch(100% 0 0 / calc(var(--lg-sheen, 0.45) * 1)) 50%,
      oklch(100% 0 0 / 0) 60%
    );
    background-size: 200% 200%;
    background-position: 0% 50%;
    background-repeat: no-repeat;
    mix-blend-mode: screen;
    pointer-events:none;
  }

  /* ─── Load animations ──────────────────────────────────────────── */
  @keyframes gl-rise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes gl-fade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes gl-draw {
    from { stroke-dashoffset: 3000; }
    to   { stroke-dashoffset: 0; }
  }
  @keyframes gl-grow {
    from { transform: scaleY(0); }
    to   { transform: scaleY(1); }
  }
  @keyframes gl-accent-pulse {
    0%,100% { box-shadow: 0 0 0 3px var(--accent-glow), 0 8px 24px oklch(20% 0 0 / 0.1); }
    50%     { box-shadow: 0 0 0 5px var(--accent-glow), 0 12px 30px oklch(20% 0 0 / 0.14); }
  }

  .gl-rise {
    opacity: 0;
    animation: gl-rise 460ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  .gl-fade {
    opacity: 0;
    animation: gl-fade 500ms ease-out forwards;
  }
  .gl-draw {
    stroke-dasharray: 3000;
    stroke-dashoffset: 3000;
    animation: gl-draw 1400ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  .gl-grow {
    transform-origin: bottom;
    transform: scaleY(0);
    animation: gl-grow 560ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  /* ─── Hover effects ────────────────────────────────────────────── */
  .hover-raise {
    transition: transform 220ms cubic-bezier(0.22, 1, 0.36, 1),
                filter 220ms ease-out;
    will-change: transform;
  }
  .hover-raise:hover {
    transform: translateY(-2px);
    filter: brightness(1.03);
  }
  .hover-raise-strong {
    transition: transform 220ms cubic-bezier(0.22, 1, 0.36, 1),
                filter 220ms ease-out;
    will-change: transform;
  }
  .hover-raise-strong:hover {
    transform: translateY(-3px);
    filter: brightness(1.05) saturate(1.05);
  }

  /* Sidebar item subtle hover */
  .nav-item {
    transition: background 160ms ease-out, color 160ms ease-out, padding-left 220ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .nav-item:not([disabled]):hover {
    background: oklch(94% 0.015 115 / 0.25) !important;
    color: var(--ink) !important;
    padding-left: 12px !important;
  }

  /* Pill buttons in header */
  .pill-hover {
    transition: transform 180ms ease-out, background 180ms ease-out, border-color 180ms ease-out;
  }
  .pill-hover:hover {
    transform: translateY(-1px);
    background: oklch(90% 0.01 170 / 0.45) !important;
    border-color: oklch(95% 0.01 170 / 0.45) !important;
  }

  /* Chart legend */
  .legend-item {
    transition: transform 140ms ease-out, opacity 140ms ease-out;
  }
  .legend-item:hover {
    transform: translateY(-1px);
  }

  /* Experiment row hover */
  .exp-row {
    transition: background 180ms ease-out, transform 180ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .exp-row:hover {
    background: oklch(86% 0.012 170 / 0.45) !important;
    transform: translateX(2px);
  }

  /* Insight card hover */
  .insight-card {
    transition: transform 220ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .insight-card:hover {
    transform: translateX(2px);
  }

  /* Combined fade-in + accent pulse for active KPI tiles so animations don't conflict */
  .gl-rise.kpi-active {
    animation: gl-rise 460ms cubic-bezier(0.22, 1, 0.36, 1) forwards,
               gl-accent-pulse 2400ms ease-in-out 1 900ms;
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
